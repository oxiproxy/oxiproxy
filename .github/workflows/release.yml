name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          # Linux ARM64 (原生 ARM64 runner)
          # - os: ubuntu-24.04-arm
          #   target: aarch64-unknown-linux-gnu
          #   archive: tar.gz
          # # # Windows x86_64
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   archive: zip
          # # # macOS x86_64
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          #   archive: tar.gz
          # # # macOS ARM64
          # - os: macos-latest
          #   target: aarch64-apple-darwin
          #   archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Protobuf Compiler
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Dashboard
        run: |
          cd dashboard
          bun install
          bun run build

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"
          save-if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      - name: Inject version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Injecting version: $VERSION"
          for f in controller/Cargo.toml node/Cargo.toml client/Cargo.toml common/Cargo.toml; do
            sed -i.bak 's/^version = ".*"/version = "'"$VERSION"'"/' "$f" && rm -f "$f.bak"
          done

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p controller -p node -p client

      - name: Prepare combined archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p oxiproxy
          cp target/${{ matrix.target }}/release/controller oxiproxy/
          cp target/${{ matrix.target }}/release/node oxiproxy/
          cp target/${{ matrix.target }}/release/client oxiproxy/
          cp README.md oxiproxy/ || true
          cp LICENSE oxiproxy/ || true
          tar czf oxiproxy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz oxiproxy

      - name: Prepare individual archives (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          for bin in controller node client; do
            tar czf ${bin}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
              -C target/${{ matrix.target }}/release ${bin}
          done

      - name: Prepare combined archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path oxiproxy
          Copy-Item target/${{ matrix.target }}/release/controller.exe oxiproxy/
          Copy-Item target/${{ matrix.target }}/release/node.exe oxiproxy/
          Copy-Item target/${{ matrix.target }}/release/client.exe oxiproxy/
          if (Test-Path README.md) { Copy-Item README.md oxiproxy/ }
          if (Test-Path LICENSE) { Copy-Item LICENSE oxiproxy/ }
          Compress-Archive -Path oxiproxy -DestinationPath oxiproxy-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Prepare individual archives (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          foreach ($bin in @("controller", "node", "client")) {
            Compress-Archive -Path "target/${{ matrix.target }}/release/${bin}.exe" `
              -DestinationPath "${bin}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oxiproxy-${{ matrix.target }}
          path: |
            oxiproxy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            oxiproxy-${{ github.ref_name }}-${{ matrix.target }}.zip
            controller-${{ github.ref_name }}-${{ matrix.target }}.*
            node-${{ github.ref_name }}-${{ matrix.target }}.*
            client-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "这是第一个版本"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "从 $PREVIOUS_TAG 到 ${{ github.ref_name }} 的变更"
            CHANGELOG=$(git log ${PREVIOUS_TAG}..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges)
          fi

          # 保存到文件
          echo "$CHANGELOG" > CHANGELOG.txt
          cat CHANGELOG.txt

          # 设置输出（处理多行）
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          body: |
            ## OxiProxy ${{ github.ref_name }}

            高性能内网穿透解决方案

            ### 📝 更新内容

            ${{ steps.changelog.outputs.changelog }}

            ### 📦 下载说明

            请根据您的操作系统下载对应的二进制文件：

            - **Linux x86_64**: `oxiproxy-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz`
            - **Linux ARM64**: `oxiproxy-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz`
            - **Windows x86_64**: `oxiproxy-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip`
            - **macOS x86_64 (Intel)**: `oxiproxy-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz`
            - **macOS ARM64 (Apple Silicon)**: `oxiproxy-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz`

            每个压缩包包含三个组件：
            - `controller` - 控制器服务
            - `node` - 节点服务器
            - `client` - 客户端

            ### 🔒 校验文件完整性

            下载 `SHA256SUMS` 文件并验证：
            ```bash
            sha256sum -c SHA256SUMS
            ```

            ### 🚀 快速开始

            1. 解压下载的文件（会得到 `oxiproxy` 文件夹）
            2. 进入目录：`cd oxiproxy`
            3. 运行 controller：`./controller start`
            4. 运行 node：`./node start --controller-url http://localhost:3100 --token <token> --bind-port 7000`
            5. 运行 client：`./client start --controller-url http://localhost:3100 --token <token>`

            详细文档请参考 [README.md](https://github.com/${{ github.repository }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
